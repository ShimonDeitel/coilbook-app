name: coilbook
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
targets:
  coilbook:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
    info:
      path: App/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Coil Book - Macrame Log
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.macramelog
        PRODUCT_NAME: Coil Book - Macrame Log
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: true
    scheme:
      testTargets:
        - coilbookTests
        - coilbookUITests
  coilbookTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: coilbook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.macramelog.tests
        GENERATE_INFOPLIST_FILE: true
  coilbookUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: UITests
    dependencies:
      - target: coilbook
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.macramelog.uitests
        GENERATE_INFOPLIST_FILE: true
